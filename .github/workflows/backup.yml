name: Daily Supabase Backup to Google Drive

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Enable manual triggering from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PostgreSQL Client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump PostgreSQL Database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL is missing. Please add it to GitHub Secrets."
            exit 1
          fi
          echo "Starting pg_dump..."
          # Using --no-owner to avoid ownership issues upon restoring
          # Using --clean to add DROP TABLE commands
          pg_dump "$SUPABASE_DB_URL" --no-owner --clean > db-backup.sql
          echo "Database dump completed."

      - name: Install Node Dependencies
        run: npm install @supabase/supabase-js googleapis archiver

      - name: Run Backup & Upload Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }} # Alternatively, hard-code if always 'documents'
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node scripts/backup.js
